<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Glow Up Skin</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  >

  <style>
    :root {
      --violet: #7d4cff;
      --violet-dark: #4f2ab8;
      --pink: #ff79c6;
      --white: #ffffff;
      --soft-white: rgba(255, 255, 255, 0.88);
      --glass: rgba(26, 13, 48, 0.42);
      --border: rgba(255, 255, 255, 0.24);
      --shadow: 0 18px 55px rgba(22, 7, 45, 0.42);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
    }
body {
  font-family: Arial, Helvetica, sans-serif;
  color: var(--white);
  overflow-x: hidden;
}
   body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;

  background:
    linear-gradient(
      180deg,
      rgba(31, 13, 58, 0.18) 0%,
      rgba(31, 13, 58, 0.44) 40%,
      rgba(19, 8, 39, 0.88) 100%
    ),
    url("fondo.jpg");

  background-size: cover;
  background-position: 72% center;
  background-repeat: no-repeat;
}

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 8%;
    }

    .glow {
      position: fixed;
      inset: auto auto 8% 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(163, 102, 255, 0.34) 0%,
        rgba(255, 105, 202, 0.16) 42%,
        rgba(255, 255, 255, 0) 72%
      );
      filter: blur(20px);
      z-index: -1;
      pointer-events: none;
    }

    .card {
      width: min(100%, 460px);
      padding: 28px;
      border-radius: 28px;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      text-align: center;
      animation: rise 0.8s ease both;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.11);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.1rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
      margin-bottom: 16px;
      text-wrap: balance;
      text-shadow: 0 4px 25px rgba(22, 7, 45, 0.45);
    }

    .highlight {
      background: linear-gradient(90deg, #ffffff, #f8c4ff, #d7c5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .description {
      max-width: 360px;
      margin: 0 auto 24px;
      color: var(--soft-white);
      font-size: 1rem;
      line-height: 1.55;
      text-wrap: balance;
    }

    .button {
      width: 100%;
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: 18px;
      text-decoration: none;
      color: #ffffff;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      background: linear-gradient(135deg, var(--violet), var(--pink));
      box-shadow:
        0 14px 30px rgba(111, 65, 255, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        filter 0.2s ease;
      cursor: pointer;
    }

    .button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow:
        0 18px 36px rgba(111, 65, 255, 0.43),
        inset 0 1px 0 rgba(255, 255, 255, 0.34);
    }

    .button:active {
      transform: translateY(0) scale(0.99);
    }

    .arrow {
      font-size: 1.2rem;
      transition: transform 0.2s ease;
    }

    .button:hover .arrow {
      transform: translateX(4px);
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
    }

    .social {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 800;
      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    .social:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.18);
    }

    .footer {
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.74rem;
       font-family: Arial, Helvetica, sans-serif !important;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

   @media (max-width: 768px) {
  body::before {
    background:
      linear-gradient(
        180deg,
        rgba(18, 12, 34, 0.22) 0%,
        rgba(18, 12, 34, 0.42) 45%,
        rgba(18, 12, 34, 0.78) 100%
      ),
      url("fondomobile.jpg");

    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }

  .page {
    min-height: 100vh;
    min-height: 100svh;
    align-items: flex-end;
    justify-content: center;
    padding: 18px 14px 20px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    padding: 22px 18px;
    border-radius: 24px;
    text-align: center;
  }

  /* Mantiene la tipografía original en celular */
  .card,
  .brand,
  h1,
  .highlight,
  .description,
  .button,
  .footer {
    font-family: Arial, Helvetica, sans-serif !important;
  }

  .brand {
    font-weight: 700;
  }

  h1 {
    font-size: clamp(2.05rem, 9.5vw, 2.75rem);
    line-height: 1;
    font-weight: 800;
  }

  .description {
    max-width: 340px;
    margin: 0 auto 22px;
    font-size: 0.96rem;
    line-height: 1.5;
    font-weight: 400;
  }

  .button {
    min-height: 58px;
    font-weight: 800;
  }

  .socials {
    justify-content: center;
  }

  .footer {
    font-weight: 400;
  }
}
  </style>
</head>

<body>
  <main class="page">
    <div class="glow"></div>

    <section class="card">
      <div class="brand">Glow Up Skin ✦</div>

      <h1>

      <!-- PEGA AQUÍ EL ENLACE DE TU TIENDA -->
      <a

        target="_blank"
        rel="noopener noreferrer"
      >
        Descubrir
        <span class="arrow">→</span>
      </a>

      <div class="socials">

  <a
    class="social"
    href="https://www.tiktok.com/@glow.up.skinofficial"

    rel="noopener noreferrer"

  <a

  <a

  <a
    class="social"

  >
    <i class="fa-brands fa-whatsapp"></i>
  </a>

</div>

      <p class="footer">Glow Up Skin · Skincare coreano</p>
    </section>
  </main>
</body>
</html>
